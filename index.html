        // Helper function to shuffle options while preserving correct answer
        function shuffleOptions(question) {
            const options = [...question.options];
            const correctText = options[question.correct];
            
            // Create array of indices
            const indices = [0, 1, 2, 3];
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            
            // Shuffle options
            const shuffledOptions = indices.map(i => options[i]);
            const newCorrectIndex = indices.findIndex(i => i === question.correct);
            
            return {
                ...question,
                options: shuffledOptions,
                correct: newCorrectIndex
            };
        }

            { text: "$\\int_0^1 \\frac{dx}{\\sqrt{1-x^2}}$ equals:", options: ["$\\frac{\\pi}{2}$", "$\\frac{\\pi}{4}$", "$\\frac{\\pi}{6}$", "$\\frac{\\pi}{3}$"], correct: 0, explanation: "$[\\sin^{-1}x]_0^1 = \\pi/2$" },
            { text: "$\\int_0^{\\pi/2} \\cos^2 x dx$ equals:", options: ["$\\frac{\\pi}{4}$", "$\\frac{\\pi}{2}$", "$\\frac{\\pi}{8}$", "$\\frac{\\pi}{3}$"], correct: 0, explanation: "$\\int_0^{\\pi/2} \\frac{1+\\cos2x}{2} dx = [x/2 + \\sin2x/4]_0^{\\pi/2} = \\pi/4$" },
            { text: "$\\int_0^1 x e^x dx$ equals:", options: ["$1$", "$e-1$", "$e-2$", "$2$"], correct: 0, explanation: "$[xe^x - e^x]_0^1 = (e-e) - (0-1) = 1$" },
            { text: "The area bounded by $y = \\sin x$, $x=0$, $x=\\pi$, and the x-axis is:", options: ["$2$", "$1$", "$0$", "$\\pi$"], correct: 0, explanation: "$\\int_0^{\\pi} \\sin x dx = [-\\cos x]_0^{\\pi} = 1+1=2$" }
        ];
        
        // Shuffle options for each question to randomize correct answer position
        const questions = rawQuestions.map(q => shuffleOptions(q));
        
        let currentIndex = 0;
        let answers = new Array(questions.length).fill(null);
        let submitted = new Array(questions.length).fill(false);
        let timerInterval;
        let timeSeconds = 100 * 60; // 100 minutes
        
        function formatTime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            if (hours > 0) {
                return `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeSeconds <= 0) {
                    clearInterval(timerInterval);
                    alert("Time's up! Submitting your test...");
                    submitTest();
                } else {
                    timeSeconds--;
                    document.getElementById('timerDisplay').textContent = formatTime(timeSeconds);
                }
            }, 1000);
        }
        
        function updateStats() {
            const answered = submitted.filter(s => s === true).length;
            document.getElementById('answeredCount').textContent = answered;
            document.getElementById('lockedCount').textContent = answered;
            document.getElementById('currentQNumber').textContent = currentIndex + 1;
            document.getElementById('totalQ').textContent = questions.length;
        }
        
        function renderQuestion() {
            const q = questions[currentIndex];
            const area = document.getElementById('questionArea');
            const isLocked = submitted[currentIndex];
            
            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                const letter = String.fromCharCode(65 + idx);
                const isSelected = answers[currentIndex] === idx;
                const lockedClass = isLocked ? 'locked' : '';
                const selectedClass = isSelected ? 'selected' : '';
                
                optionsHtml += `
                    <div class="option ${selectedClass} ${lockedClass}" onclick="${!isLocked ? `selectOption(${idx})` : ''}">
                        <div class="option-letter">${letter}</div>
                        <div class="option-text">${opt}</div>
                    </div>
                `;
            });
            
            const feedbackHtml = submitted[currentIndex] ? 
                `<div class="feedback ${answers[currentIndex] === q.correct ? 'correct' : 'incorrect'}">
                    ${answers[currentIndex] === q.correct ? q.explanation : 'Correct answer: ' + String.fromCharCode(65 + q.correct) + '. ' + q.explanation}
                </div>` : '';
            
            const lockedIndicator = isLocked ? '<span class="locked-badge">🔒 Locked</span>' : '';
            const sectionNumber = currentIndex < 50 ? 'Chapter 2: Differentiation' : 'Chapter 3: Integration';
            
            area.innerHTML = `
                <div class="question-number">
                    Question ${currentIndex + 1} of ${questions.length} 
                    <span class="section-badge">${sectionNumber}</span>
                    ${lockedIndicator}
                </div>
                <div class="question-text">${q.text}</div>
                <div class="options">
                    ${optionsHtml}
                </div>
                ${feedbackHtml}
                <div class="nav-buttons">
                    <button class="btn-secondary" onclick="previousQuestion()" ${currentIndex === 0 ? 'disabled' : ''}>← Previous</button>
                    <button class="btn-primary" onclick="nextQuestion()" ${currentIndex === questions.length - 1 ? 'disabled' : ''}>Next →</button>
                    ${currentIndex === questions.length - 1 ? '<button class="btn-success" onclick="submitTest()">Submit Test</button>' : ''}
                </div>
            `;
            
            const progress = ((currentIndex + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
            updateStats();
            
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }
        
        function selectOption(optionIndex) {
            if (!submitted[currentIndex]) {
                answers[currentIndex] = optionIndex;
                submitted[currentIndex] = true;
                renderQuestion();
            }
        }
        
        function previousQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }
        
        function nextQuestion() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        }
        
        function submitTest() {
            clearInterval(timerInterval);
            let score = 0;
            const results = [];
            for (let i = 0; i < questions.length; i++) {
                const isCorrect = answers[i] === questions[i].correct;
                if (isCorrect) score++;
                results.push({
                    number: i + 1,
                    text: questions[i].text,
                    userAnswer: answers[i] !== null ? String.fromCharCode(65 + answers[i]) : 'Not answered',
                    correctAnswer: String.fromCharCode(65 + questions[i].correct),
                    isCorrect: isCorrect,
                    explanation: questions[i].explanation,
                    section: i < 50 ? 'Ch 2' : 'Ch 3'
                });
            }
            
            document.getElementById('questionArea').classList.add('hide');
            const resultArea = document.getElementById('resultArea');
            resultArea.classList.remove('hide');
            
            const percentage = (score / questions.length) * 100;
            let grade = '';
            if (percentage >= 90) grade = 'A+ (Excellent!)';
            else if (percentage >= 80) grade = 'A (Very Good!)';
            else if (percentage >= 70) grade = 'B (Good!)';
            else if (percentage >= 60) grade = 'C (Satisfactory)';
            else if (percentage >= 50) grade = 'D (Need Improvement)';
            else grade = 'F (Needs Hard Work)';
            
            const ch2Correct = results.filter(r => r.section === 'Ch 2' && r.isCorrect).length;
            const ch3Correct = results.filter(r => r.section === 'Ch 3' && r.isCorrect).length;
            
            let reviewHtml = '';
            results.forEach(r => {
                reviewHtml += `
                    <div class="review-item ${r.isCorrect ? 'correct' : 'incorrect'}">
                        <div class="review-question">Q${r.number} [${r.section}]: ${r.text}</div>
                        <div class="review-answer">
                            Your answer: ${r.userAnswer} | Correct answer: ${r.correctAnswer}<br>
                            ${!r.isCorrect ? `<span style="color:#dc3545">Explanation: ${r.explanation}</span>` : `<span style="color:#28a745">✓ Correct</span>`}
                        </div>
                    </div>
                `;
            });
            
            resultArea.innerHTML = `
                <div class="result-container">
                    <h2>🎯 Test Completed!</h2>
                    <div class="score-circle">
                        <div class="score-number">${score}</div>
                        <div class="score-total">/${questions.length}</div>
                        <div style="font-size:14px; margin-top:8px">${percentage.toFixed(1)}%</div>
                    </div>
                    <div class="result-details">
                        <h3>Grade: ${grade}</h3>
                        <p>✅ Correct Answers: ${score}</p>
                        <p>❌ Incorrect Answers: ${questions.length - score}</p>
                        <p>📝 Unanswered: ${answers.filter(a => a === null).length}</p>
                        <hr>
                        <h4>📊 Chapter-wise Analysis:</h4>
                        <p>📈 Chapter 2 (Differentiation): ${ch2Correct}/50 correct (${Math.round(ch2Correct/50*100)}%)</p>
                        <p>📉 Chapter 3 (Integration): ${ch3Correct}/50 correct (${Math.round(ch3Correct/50*100)}%)</p>
                        <button class="btn-primary" onclick="restartTest()" style="margin-top:15px">🔄 Take Test Again</button>
                        <button class="btn-secondary" onclick="toggleReview()" style="margin-top:15px; margin-left:10px">📋 Show/Hide Review</button>
                    </div>
                    <div id="reviewSection" style="display:none; margin-top:20px;">
                        <h3>Detailed Review:</h3>
                        <div class="review-list">
                            ${reviewHtml}
                        </div>
                    </div>
                </div>
            `;
        }
        
        function toggleReview() {
            const reviewSection = document.getElementById('reviewSection');
            if (reviewSection) {
                reviewSection.style.display = reviewSection.style.display === 'none' ? 'block' : 'none';
            }
        }
        
        function restartTest() {
            currentIndex = 0;
            answers = new Array(questions.length).fill(null);
            submitted = new Array(questions.length).fill(false);
            timeSeconds = 100 * 60;
            clearInterval(timerInterval);
            startTimer();
            document.getElementById('resultArea').classList.add('hide');
            document.getElementById('questionArea').classList.remove('hide');
            renderQuestion();
        }
        
        // Initialize the test
        renderQuestion();
        startTimer();
    </script>
</body>
</html>
