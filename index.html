<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #4a90e2, #2c3e50);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            width: 100%;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #4a90e2, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .question-container {
            padding: 40px;
        }
        
        .question-number {
            color: #4a90e2;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .question-text {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.4;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .option {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .option:hover {
            background: #e3f2fd;
            border-color: #4a90e2;
            transform: translateX(5px);
        }
        
        .option.selected {
            background: #4a90e2;
            border-color: #4a90e2;
            color: white;
        }
        
        .option.selected .option-letter {
            background: white;
            color: #4a90e2;
        }
        
        .option-letter {
            width: 40px;
            height: 40px;
            background: #e0e0e0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            margin-right: 15px;
            transition: all 0.3s ease;
        }
        
        .option-text {
            font-size: 16px;
            flex: 1;
        }
        
        .feedback {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: none;
        }
        
        .feedback.correct {
            background: #d4edda;
            border: 1px solid #28a745;
            color: #155724;
            display: block;
        }
        
        .feedback.incorrect {
            background: #f8d7da;
            border: 1px solid #dc3545;
            color: #721c24;
            display: block;
        }
        
        .feedback.correct::before {
            content: "✓ Correct! ";
            font-weight: bold;
        }
        
        .feedback.incorrect::before {
            content: "✗ Incorrect! ";
            font-weight: bold;
        }
        
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }
        
        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4a90e2, #2c3e50);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(74,144,226,0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: #5a6268;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result-container {
            text-align: center;
            padding: 40px;
        }
        
        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }
        
        .score-number {
            font-size: 48px;
            font-weight: bold;
        }
        
        .score-total {
            font-size: 24px;
        }
        
        .result-details {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .review-btn {
            background: #4a90e2;
            color: white;
            padding: 12px 30px;
            margin-top: 20px;
            display: inline-block;
        }
        
        .review-list {
            margin-top: 20px;
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .review-item {
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            background: white;
            border-left: 4px solid;
        }
        
        .review-item.correct {
            border-left-color: #28a745;
        }
        
        .review-item.incorrect {
            border-left-color: #dc3545;
        }
        
        .review-question {
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .review-answer {
            font-size: 14px;
            color: #666;
        }
        
        .hide {
            display: none;
        }
        
        @media (max-width: 600px) {
            .question-container {
                padding: 20px;
            }
            .question-text {
                font-size: 18px;
            }
            .option {
                padding: 12px;
            }
        }
    </style>
</head>

        let currentIndex = 0;
        let answers = new Array(questions.length).fill(null);
        let submitted = new Array(questions.length).fill(false);
        
        function renderQuestion() {
            const q = questions[currentIndex];
            const area = document.getElementById('questionArea');
            
            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                const letter = String.fromCharCode(65 + idx);
                const isSelected = answers[currentIndex] === idx;
                optionsHtml += `
                    <div class="option ${isSelected ? 'selected' : ''}" onclick="selectOption(${idx})">
                        <div class="option-letter">${letter}</div>
                        <div class="option-text">${opt}</div>
                    </div>
                `;
            });
            
            const feedbackHtml = submitted[currentIndex] ? 
                `<div class="feedback ${answers[currentIndex] === q.correct ? 'correct' : 'incorrect'}">
                    ${answers[currentIndex] === q.correct ? q.explanation : 'Correct answer: ' + String.fromCharCode(65 + q.correct) + '. ' + q.explanation}
                </div>` : '';
            
            area.innerHTML = `
                <div class="question-number">Question ${currentIndex + 1} of ${questions.length}</div>
                <div class="question-text">${q.text}</div>
                <div class="options">
                    ${optionsHtml}
                </div>
                ${feedbackHtml}
                <div class="nav-buttons">
                    <button class="btn-secondary" onclick="previousQuestion()" ${currentIndex === 0 ? 'disabled' : ''}>← Previous</button>
                    <button class="btn-primary" onclick="nextQuestion()" ${currentIndex === questions.length - 1 ? 'disabled' : ''}>Next →</button>
                    ${currentIndex === questions.length - 1 ? '<button class="btn-success" onclick="submitTest()">Submit Test</button>' : ''}
                </div>
            `;
            
            // Update progress bar
            const progress = ((currentIndex + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
        }
        
        function selectOption(optionIndex) {
            answers[currentIndex] = optionIndex;
            submitted[currentIndex] = true;
            renderQuestion();
        }
        
        function previousQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }
        
        function nextQuestion() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        }
        
        function submitTest() {
            let score = 0;
            const results = [];
            for (let i = 0; i < questions.length; i++) {
                const isCorrect = answers[i] === questions[i].correct;
                if (isCorrect) score++;
                results.push({
                    number: i + 1,
                    text: questions[i].text,
                    userAnswer: answers[i] !== null ? String.fromCharCode(65 + answers[i]) : 'Not answered',
                    correctAnswer: String.fromCharCode(65 + questions[i].correct),
                    isCorrect: isCorrect,
                    explanation: questions[i].explanation
                });
            }
            
            document.getElementById('questionArea').classList.add('hide');
            const resultArea = document.getElementById('resultArea');
            resultArea.classList.remove('hide');
            
            const percentage = (score / questions.length) * 100;
            let grade = '';
            if (percentage >= 90) grade = 'A+ (Excellent!)';
            else if (percentage >= 80) grade = 'A (Very Good!)';
            else if (percentage >= 70) grade = 'B (Good!)';
            else if (percentage >= 60) grade = 'C (Satisfactory)';
            else if (percentage >= 50) grade = 'D (Need Improvement)';
            else grade = 'F (Needs Hard Work)';
            
            let reviewHtml = '';
            results.forEach(r => {
                reviewHtml += `
                    <div class="review-item ${r.isCorrect ? 'correct' : 'incorrect'}">
                        <div class="review-question">Q${r.number}: ${r.text}</div>
                        <div class="review-answer">
                            Your answer: ${r.userAnswer} | Correct answer: ${r.correctAnswer}<br>
                            ${!r.isCorrect ? `<span style="color:#dc3545">Explanation: ${r.explanation}</span>` : `<span style="color:#28a745">✓ Correct</span>`}
                        </div>
                    </div>
                `;
            });
            
            resultArea.innerHTML = `
                <div class="result-container">
                    <h2>🎯 Test Completed!</h2>
                    <div class="score-circle">
                        <div class="score-number">${score}</div>
                        <div class="score-total">/${questions.length}</div>
                        <div style="font-size:14px; margin-top:8px">${percentage.toFixed(1)}%</div>
                    </div>
                    <div class="result-details">
                        <h3>Grade: ${grade}</h3>
                        <p>Correct Answers: ${score}</p>
                        <p>Incorrect Answers: ${questions.length - score}</p>
                        <p>Unanswered: ${answers.filter(a => a === null).length}</p>
                        <button class="btn-primary" onclick="restartTest()" style="margin-top:15px">🔄 Take Test Again</button>
                        <button class="btn-secondary" onclick="toggleReview()" style="margin-top:15px; margin-left:10px">📋 Show/Hide Review</button>
                    </div>
                    <div id="reviewSection" style="display:none; margin-top:20px;">
                        <h3>Detailed Review:</h3>
                        <div class="review-list">
                            ${reviewHtml}
                        </div>
                    </div>
                </div>
            `;
        }
        
        function toggleReview() {
            const reviewSection = document.getElementById('reviewSection');
            if (reviewSection) {
                reviewSection.style.display = reviewSection.style.display === 'none' ? 'block' : 'none';
            }
        }
        
        function restartTest() {
            currentIndex = 0;
            answers = new Array(questions.length).fill(null);
            submitted = new Array(questions.length).fill(false);
            document.getElementById('resultArea').classList.add('hide');
            document.getElementById('questionArea').classList.remove('hide');
            renderQuestion();
        }
        
        // Initialize the test
        renderQuestion();
    </script>
